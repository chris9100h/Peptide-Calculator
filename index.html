<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peptid Calculator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 24px;
    }
    .card {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      color: #ccc;
    }
    input, select {
      width: 100%;
      padding: 14px;
      background: #2a2a2a;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
    }
    .unit-selector {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .unit-selector button {
      flex: 1;
      padding: 10px;
      background: #2a2a2a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }
    .unit-selector button.active {
      background: #2481cc;
    }
    button#calcBtn {
      width: 100%;
      padding: 16px;
      background: #2481cc;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      margin-top: 10px;
    }
    .result {
      background: #1a3c1a;
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      margin: 24px 0;
      font-size: 28px;
      font-weight: bold;
      display: none;
    }
    .info {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Peptid Syringe Calculator</h1>

    <div class="card">
      <label>Vial capacity (mg)</label>
      <input type="text" id="vial" value="36" placeholder="z.B. 36 oder 10,5">
    </div>

    <div class="card">
      <label>Bacteriostatic water (ml)</label>
      <input type="text" id="water" value="1.8" placeholder="z.B. 1,8 oder 2">
    </div>

    <div class="card">
      <label>Gewünschte Dosis</label>
      <input type="text" id="dose" value="4" placeholder="z.B. 4 oder 250">
      
      <div class="unit-selector">
        <button id="btn-mg" class="active" onclick="setUnit('mg')">mg</button>
        <button id="btn-mcg" onclick="setUnit('mcg')">mcg</button>
      </div>
    </div>

    <button id="calcBtn" onclick="calculate()">Berechnen</button>

    <div id="result" class="result">
      <div>Ziehe <span id="units" style="color:#4ade80">20</span> Units auf</div>
      <div style="font-size:16px; margin-top:8px; color:#aaa;">
        entspricht <span id="ml">0,20</span> ml
      </div>
    </div>

    <div class="info">
      100 Units = 1 ml<br>
      Empfohlene Spritzen: 0,3 ml / 0,5 ml / 1 ml
    </div>
  </div>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let doseUnit = 'mg';   // Standard: mg

    function setUnit(unit) {
      doseUnit = unit;
      document.getElementById('btn-mg').classList.toggle('active', unit === 'mg');
      document.getElementById('btn-mcg').classList.toggle('active', unit === 'mcg');
    }

    // Ersetzt Komma durch Punkt und entfernt ungültige Zeichen
    function parseNumber(str) {
      if (!str) return NaN;
      str = str.trim().replace(',', '.');           // Komma → Punkt
      str = str.replace(/[^0-9.-]/g, '');           // Nur Zahlen, Punkt und Minus erlauben
      return parseFloat(str);
    }

    function calculate() {
      const vialStr = document.getElementById('vial').value;
      const waterStr = document.getElementById('water').value;
      const doseStr = document.getElementById('dose').value;

      const vial = parseNumber(vialStr);
      const water = parseNumber(waterStr);
      let dose = parseNumber(doseStr);

      // Wenn irgendwas ungültig ist → nichts tun
      if (!vial || !water || !dose || water <= 0) {
        return;
      }

      // mcg in mg umrechnen
      if (doseUnit === 'mcg') {
        dose = dose / 1000;
      }

      const concentration = vial / water;        // mg/ml
      const volumeMl = dose / concentration;     // benötigte ml
      const units = Math.round(volumeMl * 100);  // Units auf Insulin-Spritze

      // Ergebnis anzeigen
      document.getElementById('units').textContent = units;
      document.getElementById('ml').textContent = volumeMl.toFixed(2).replace('.', ',');
      document.getElementById('result').style.display = 'block';

      // leichte Vibration
      if (Telegram.WebApp.HapticFeedback) {
        Telegram.WebApp.HapticFeedback.impactOccurred("light");
      }
    }
  </script>
</body>
</html>
