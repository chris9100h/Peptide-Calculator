<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peptide Calculator</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #121212;
      --input: #1e1e1e;
      --accent: #ff9500;
      --text: #ffffff;
      --secondary: #aaaaaa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      font-size: 23px;
      font-weight: 700;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--accent);
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    label {
      display: block;
      font-size: 15px;
      color: var(--secondary);
      margin-bottom: 10px;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: var(--input);
      border: none;
      border-radius: 12px;
      padding: 16px 18px;
      color: white;
      font-size: 20px;
      font-weight: 500;
      box-sizing: border-box;
    }

    input[type="date"] {
      width: 100% !important;
      background: var(--input) !important;
      border: none !important;
      border-radius: 12px !important;
      padding: 16px 18px !important;
      color: white !important;
      font-size: 20px !important;
      font-weight: 500 !important;
      box-sizing: border-box !important;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.6;
    }

    .toggle-group {
      display: flex;
      background: var(--input);
      border-radius: 12px;
      padding: 5px;
      margin-top: 10px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      background: transparent;
      color: var(--secondary);
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: var(--accent);
      color: black;
      box-shadow: 0 2px 8px rgba(255, 149, 0, 0.4);
    }

    #calcBtn {
      width: 100%;
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 19px;
      font-weight: 700;
      margin: 10px 0 20px;
      box-shadow: 0 6px 16px rgba(255, 149, 0, 0.35);
    }

    .result {
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      margin: 20px 0;
      display: none;
      box-shadow: 0 6px 20px rgba(255, 149, 0, 0.2);
    }

    .result .units {
      font-size: 42px;
      font-weight: 800;
      color: var(--accent);
    }

    .doses-info {
      margin-top: 12px;
      font-size: 17px;
      color: var(--accent);
      font-weight: 600;
    }

    /* Print Labels */
    #mainApp { display: block; }

    .label-section {
      margin-top: 24px;
    }

    .label-preview {
      background: var(--card);
      border: 3px solid var(--accent);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    #printContainer {
      display: none;
    }

    .print-label {
      width: 3cm;
      height: 1.65cm;
      border: 3px solid #ff9500;
      border-radius: 8px;
      background: white;
      color: black;
      padding: 5px 6px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: Arial, sans-serif;
      margin: 4mm 0;
    }

    .print-label .title {
      font-size: 10pt;
      font-weight: 800;
      color: #ff9500;
      text-align: center;
      margin-bottom: 1px;
      line-height: 1;
    }

    .print-label .line1,
    .print-label .line2,
    .print-label .line3 {
      font-size: 6.8pt;
      font-weight: 600;
      text-align: center;
      line-height: 1.05;
      margin: 0.4px 0;
    }

    .print-label .date {
      font-size: 6pt;
      text-align: center;
      margin-top: 3px;
      border-top: 1px solid #ddd;
      padding-top: 2px;
    }

    @media print {
      @page { margin: 0; size: A4 portrait; }
      body { margin: 0; padding: 10mm 8mm; }
      #mainApp, #mainApp * { display: none !important; }
      #printContainer {
        display: flex !important;
        flex-direction: column;
        align-items: center;
        gap: 6mm;
        width: 100%;
      }
    }

    .info {
      text-align: center;
      color: var(--secondary);
      font-size: 14.5px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="mainApp">
    <div class="header">
      🧪 Peptide Calculator
    </div>

    <div class="card">
      <label>Peptide Name</label>
      <input type="text" id="peptideName" placeholder="e.g. MT2, Semaglutide...">
    </div>

    <div class="card">
      <label>Vial contains</label>
      <input type="text" id="vial" placeholder="e.g. 36">
      <div class="toggle-group">
        <button id="vial-mg" class="toggle-btn active" onclick="setVialUnit('mg')">mg</button>
        <button id="vial-mcg" class="toggle-btn" onclick="setVialUnit('mcg')">mcg</button>
      </div>
    </div>

    <div class="card">
      <label>Bacteriostatic water (ml)</label>
      <input type="text" id="water" placeholder="e.g. 1.8 or 2">
    </div>

    <div class="card">
      <label>Desired Dose</label>
      <input type="text" id="dose" placeholder="e.g. 4 or 250">
      <div class="toggle-group">
        <button id="dose-mg" class="toggle-btn active" onclick="setDoseUnit('mg')">mg</button>
        <button id="dose-mcg" class="toggle-btn" onclick="setDoseUnit('mcg')">mcg</button>
      </div>
    </div>

    <button id="calcBtn" onclick="calculate()">Calculate</button>

    <div id="result" class="result">
      <div>Draw up <span id="units" class="units">20</span> Units</div>
      <div id="syringeContainer" style="margin: 18px 0 10px; padding: 0 4px;"></div>
      <div style="margin-top: 4px; font-size: 18px; color: #aaa;">
        corresponds to <span id="ml">0.200</span> ml
      </div>
      <div id="dosesInfo" class="doses-info">Doses in vial: <strong>9</strong></div>
    </div>

    <div id="labelSection" class="label-section" style="display: none;">
      <h2 style="text-align:center; margin:20px 0 12px; color:#ff9500; font-size:18px;">Vial Label (3cm × 1.65cm)</h2>
      
      <div id="labelPreview" class="label-preview">
        <div style="font-size:22px; font-weight:800; color:#ff9500;" id="previewTitle">HGH</div>
        <div style="font-size:14px; font-weight:600;" id="previewLine1">36mg in 1.8ml</div>
        <div style="font-size:13px;" id="previewLine2">20.00mg / ml</div>
        <div style="font-size:13px;" id="previewLine3">4mg = 20u</div>
        <div style="font-size:12px; margin-top:8px; border-top:1px solid #555; padding-top:6px;" id="previewDate">Reconst. Date | 08.04.2026</div>
      </div>

      <button onclick="printLabels()" 
              style="width:100%; background:#ff9500; color:black; border:none; border-radius:14px; padding:16px; font-size:18px; font-weight:700;">
        🖨️ Print 5 Labels
      </button>
    </div>

    <div class="info">
      100 Units = 1 ml<br>
      Recommended syringes: 0.3 ml / 0.5 ml / 1 ml
    </div>
  </div>

  <div id="printContainer"></div>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let vialUnit = 'mg';
    let doseUnit = 'mg';

    function setVialUnit(unit) {
      vialUnit = unit;
      document.getElementById('vial-mg').classList.toggle('active', unit === 'mg');
      document.getElementById('vial-mcg').classList.toggle('active', unit === 'mcg');
    }

    function setDoseUnit(unit) {
      doseUnit = unit;
      document.getElementById('dose-mg').classList.toggle('active', unit === 'mg');
      document.getElementById('dose-mcg').classList.toggle('active', unit === 'mcg');
    }

    function parseNumber(str) {
      if (!str) return NaN;
      str = str.trim().replace(',', '.').replace(/[^0-9.-]/g, '');
      return parseFloat(str);
    }

    function renderSyringe(units) {
      const maxU = 100;
      const cappedU = Math.min(units, maxU);
      const pct = cappedU / maxU;

      // Barrel geometry
      const BL = 14, BR = 256, BT = 14, BB = 38;
      const BW = BR - BL, BH = BB - BT;
      const MY = (BT + BB) / 2; // midpoint Y = 26

      // Liquid fills from needle (right) leftward — 0 is at needle/right, 100 at plunger/left
      const fillW = pct * BW;
      const discX = BR - fillW; // plunger disc = left boundary of liquid
      const overRange = units > maxU;
      const fillColor = overRange ? '#e74c3c' : '#ff9500';

      // Tick marks: 0 at right (BR), 100 at left (BL)
      let ticks = '';
      for (let i = 0; i <= 10; i++) {
        const tx = (BR - (i / 10) * BW).toFixed(1);
        const isMajor = i % 5 === 0;
        const tickH = isMajor ? 9 : 5;
        ticks += `<line x1="${tx}" y1="${BB}" x2="${tx}" y2="${(BB - tickH).toFixed(1)}" stroke="#2a2a2a" stroke-width="${isMajor ? 1.5 : 1}"/>`;
      }

      // Scale labels every 20 units: 0 at right, 100 at left
      let labels = '';
      for (let i = 0; i <= 5; i++) {
        const lu = i * 20;
        const lx = (BR - (i / 5) * BW).toFixed(1);
        labels += `<text x="${lx}" y="${BB + 12}" text-anchor="middle" font-size="8" fill="#555">${lu}</text>`;
      }

      // Keep the units label inside the barrel bounds
      const labelX = Math.min(Math.max(discX, BL + 14), BR - 14).toFixed(1);

      const svg = `<svg viewBox="0 0 300 56" style="width:100%;overflow:visible;">
        <!-- Barrel background -->
        <rect x="${BL}" y="${BT}" width="${BW}" height="${BH}" rx="3" fill="#111" stroke="#3a3a3a" stroke-width="1.5"/>
        <!-- Liquid fill: from disc rightward to needle -->
        ${fillW > 1 ? `<rect x="${(discX + 1).toFixed(1)}" y="${(BT + 1).toFixed(1)}" width="${(fillW - 1).toFixed(1)}" height="${(BH - 2).toFixed(1)}" rx="2" fill="${fillColor}" opacity="0.88"/>` : ''}
        <!-- Tick marks -->
        ${ticks}
        <!-- Scale labels -->
        ${labels}
        <!-- Plunger disc at target -->
        <rect x="${(discX - 3).toFixed(1)}" y="${(BT - 4).toFixed(1)}" width="6" height="${(BH + 8).toFixed(1)}" rx="2.5" fill="#ddd"/>
        <!-- Units label above disc -->
        ${units > 0 ? `<text x="${labelX}" y="${(BT - 9).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="${fillColor}">${units}U</text>` : ''}
        <!-- Needle connector -->
        <rect x="${BR}" y="${(BT + 5).toFixed(1)}" width="13" height="${(BH - 10).toFixed(1)}" rx="1.5" fill="#555"/>
        <!-- Needle shaft -->
        <line x1="${BR + 13}" y1="${MY.toFixed(1)}" x2="293" y2="${MY.toFixed(1)}" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Needle tip -->
        <polygon points="288,${(MY - 3).toFixed(1)} 295,${MY.toFixed(1)} 288,${(MY + 3).toFixed(1)}" fill="#888"/>
      </svg>`;

      const warning = overRange
        ? `<div style="color:#e74c3c;font-size:13px;margin-top:6px;text-align:center;">⚠️ Exceeds 100U – use a larger syringe</div>`
        : '';

      return svg + warning;
    }

    function calculate() {
      let vial = parseNumber(document.getElementById('vial').value);
      const water = parseNumber(document.getElementById('water').value);
      let dose = parseNumber(document.getElementById('dose').value);
      const peptideName = document.getElementById('peptideName').value.trim() || "Peptide";

      const originalDoseStr = document.getElementById('dose').value.trim();

      if (!vial || !water || !dose || water <= 0) return;

      if (vialUnit === 'mcg') vial /= 1000;
      if (doseUnit === 'mcg') dose /= 1000;

      const concentration = vial / water;
      const volumeMl = dose / concentration;
      const units = Math.round(volumeMl * 100);

      const dosesInVial = Math.floor(vial / dose);

      document.getElementById('units').textContent = units;
      document.getElementById('syringeContainer').innerHTML = renderSyringe(units);
      document.getElementById('ml').textContent = volumeMl.toFixed(3);
      document.getElementById('dosesInfo').innerHTML = `Doses in vial: <strong>${dosesInVial}</strong>`;
      document.getElementById('result').style.display = 'block';

      // Label Preview – zeigt exakt die Einheit, die der User gewählt hat
      document.getElementById('previewTitle').textContent = peptideName.toUpperCase();
      document.getElementById('previewLine1').textContent = `${document.getElementById('vial').value}${vialUnit} in ${water}ml`;
      document.getElementById('previewLine2').textContent = `${concentration.toFixed(2)}mg / ml`;
      document.getElementById('previewLine3').textContent = `${originalDoseStr}${doseUnit} = ${units}u`;
      document.getElementById('previewDate').innerHTML = 
        `Reconst. Date | <strong>${new Date(document.getElementById('reconstDate').value).toLocaleDateString('de-DE')}</strong>`;

      window.currentLabelData = {
        name: peptideName.toUpperCase(),
        line1: `${document.getElementById('vial').value}${vialUnit} in ${water}ml`,
        conc: `${concentration.toFixed(2)}mg / ml`,
        doseLine: `${originalDoseStr}${doseUnit} = ${units}u`,
        date: new Date(document.getElementById('reconstDate').value).toLocaleDateString('de-DE')
      };

      document.getElementById('labelSection').style.display = 'block';
    }

    function printLabels() {
      const data = window.currentLabelData;
      if (!data) return;

      const container = document.getElementById('printContainer');
      container.innerHTML = '';

      for (let i = 0; i < 5; i++) {
        const label = document.createElement('div');
        label.className = 'print-label';
        label.innerHTML = `
          <div class="title">${data.name}</div>
          <div class="line1">${data.line1}</div>
          <div class="line2">${data.conc}</div>
          <div class="line3">${data.doseLine}</div>
          <div class="date">Reconst. Date | ${data.date}</div>
        `;
        container.appendChild(label);
      }

      window.print();
    }

    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      const dateCard = document.createElement('div');
      dateCard.className = 'card';
      dateCard.innerHTML = `
        <label>Reconstitution Date</label>
        <input type="date" id="reconstDate" value="${today}">
      `;
      document.querySelectorAll('.card')[0].after(dateCard);
    };
  </script>
</body>
</html>
